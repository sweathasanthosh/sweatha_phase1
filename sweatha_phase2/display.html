<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        h1{
            color:darkred;
            text-transform: capitalize;
            font-family: fantasy;
        }
        h2{
            display: inline;
            background-color:burlywood ;
        }

        h3{
            display: block;
            background-color:antiquewhite ;
        }

        h4{
            display: inline-block;
            width:100px;
            background-color:coral;

        }
        .card{
            width:200px;
            height:200px;
            display:block;

        }
        .c1{
            text-transform: uppercase;
            position: absolute;
            background: cadetblue;
            color: azure;
            padding:5px;
            left: 40%
            text-align: center;
        }
        body{
            background-color: cornsilk;
        }
    </style>
</head>
<body>
<h1>Product Display</h1><br>
<h2>Inline</h2><br>
<h3>Block</h3><br>
<h4>inline-block1</h4>
<h4>inline-block2</h4>

<div class="card" >
    <img src="https://m.media-amazon.com/images/I/81AjubmYe0L._AC_UF1000,1000_QL80_.jpg" width="200">
    <div class="c1"> for sale</div>
</div>
</body>
</html>
