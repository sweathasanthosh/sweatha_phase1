<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        body{
            background-color:rgb(22, 74, 117);
        }
        .row{
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            height:300px;
            background:beige;
            border:2px solid black;

        }
        .box{
            height:100px;
            width:100px;
            text-align: center;
            line-height:100px ;
            font-size: 20px;
            border:2px dotted black;
            background-color: rgb(213, 124, 124);

        }
        .column{            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height:400px;
            margin-top: 20px;
            background: beige;
            border:2px solid black;

        }
    </style>
</head>
<body>
    <h2>ROW(Left To Right)</h2>

    <div class="row">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        </div><br>
    <h2>COLUMN(Top To Bottom)</h2>
        <div class="column">
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        </div><br>

    
</body>
</html>
