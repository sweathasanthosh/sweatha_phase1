<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive design</title>

    <meta name="viewport" content="width=device-width,initial scale=1.0">


    <style>
        .navbar{
            width:100%;
            background:coral ;
            color: black;
            text-align: center;
            padding:15px;
            font-family: serif;
            text-transform: capitalize;
        
        }
        .container{
            display: flex;
        }
        .box{
            flex:1;
            margin:10px;
            background: bisque;
            text-align: center;
            padding:20px;

        }

        @media(min-width:601px) and (max-width:900px){
            .container{
                flex-wrap:wrap;

            }
            .box{
                flex:45%
            }
        }
        body{
            background-color: rgb(81, 117, 81);
        }
    </style>
</head>
<body>
    <div class="navbar">responsive design-desktop,mobile,tablet</div>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>

    </div>
    
</body>
</html>
